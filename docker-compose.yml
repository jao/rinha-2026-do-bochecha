services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  qdrant:
    build: ./qdrant
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "200MB"

  api1:
    build: ./api
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"

  api2:
    build: ./api
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"
