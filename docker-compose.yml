services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  qdrant:
    image: jpcamargo/rinha-qdrant:latest
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "200MB"

  api1:
    image: jpcamargo/rinha-api:latest
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"

  api2:
    image: jpcamargo/rinha-api:latest
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"

networks:
  rinha-net:
    driver: bridge
