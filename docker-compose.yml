services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  qdrant:
    image: qdrant/qdrant:v1.13.4
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "250MB"

  api1:
    build: ./api
    environment:
      - QDRANT_HOST=qdrant
      - IS_LOADER=true
      - REFERENCES_PATH=/data/references.json.gz
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "55MB"

  api2:
    build: ./api
    environment:
      - QDRANT_HOST=qdrant
      - IS_LOADER=false
      - REFERENCES_PATH=/data/references.json.gz
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "25MB"
