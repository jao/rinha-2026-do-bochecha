services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  qdrant:
    image: jpcamargo/rinha-qdrant:latest
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "200MB"

  api1:
    image: jpcamargo/rinha-api:latest
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"

  api2:
    image: jpcamargo/rinha-api:latest
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: "0.225"
          memory: "50MB"

configs:
  nginx_conf:
    content: |
      worker_processes 1;
      events { worker_connections 1024; }
      http {
          access_log off;
          keepalive_timeout 65;
          upstream api {
              server api1:8080;
              server api2:8080;
          }
          server {
              listen 9999;
              location / {
                  proxy_pass http://api;
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
              }
          }
      }
